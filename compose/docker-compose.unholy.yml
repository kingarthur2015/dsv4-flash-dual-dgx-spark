# compose/docker-compose.unholy.yml
#
# Compose override for the unholy-fusion image
# (aidendle94/sparkrun-vllm-ds4-gb10:production-ready).
#
# Usage — worker node (spark02):
#   docker compose \
#     -f docker-compose.yml \
#     -f compose/docker-compose.unholy.yml \
#     --env-file .env.unholy-fusion \
#     --profile worker up -d
#
# Usage — head node (spark01):
#   docker compose \
#     -f docker-compose.yml \
#     -f compose/docker-compose.unholy.yml \
#     --env-file .env.unholy-fusion \
#     --profile head up -d
#
# The entrypoint swap is handled by ENTRYPOINT_FILE=./entrypoints/entrypoint.unholy.sh
# in .env.unholy-fusion, which the base docker-compose.yml resolves via
# ${ENTRYPOINT_FILE:-./entrypoints/entrypoint.sh}:/entrypoint.sh:ro
#
# This file is intentionally minimal. Its presence as the second -f argument
# documents the intent and provides a stable extension point for future
# unholy-fusion-specific overrides (e.g. container name suffix, labels).

services:
  head:
    labels:
      - "vllm-spark.variant=unholy-fusion"

  worker:
    labels:
      - "vllm-spark.variant=unholy-fusion"
