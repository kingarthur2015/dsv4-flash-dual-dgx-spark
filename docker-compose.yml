services:
  head:
    image: ${VLLM_IMAGE}
    container_name: vllm-spark-head
    profiles: ["head"]
    network_mode: host
    ipc: host
    environment:
      # ---- Role + cluster mode ----
      - ROLE=head
      - CLUSTER_MODE=${CLUSTER_MODE:-single}
      - TP_SIZE=${TP_SIZE:-1}
      # DISTRIBUTED_BACKEND: ray (Ray actor mode) or mp (SPMD with --nnodes)
      - DISTRIBUTED_BACKEND=${DISTRIBUTED_BACKEND:-ray}
      - MASTER_PORT=${MASTER_PORT:-29501}
      # ---- Model ----
      - MODEL_CONTAINER_PATH=${MODEL_CONTAINER_PATH}
      - SERVED_MODEL_NAME=${SERVED_MODEL_NAME}
      # ---- vLLM Serving ----
      - HOST_PORT=${HOST_PORT}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN}
      - MAX_NUM_SEQS=${MAX_NUM_SEQS}
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION}
      - MAX_NUM_BATCHED_TOKENS=${MAX_NUM_BATCHED_TOKENS}
      - VLLM_EXTRA_ARGS=${VLLM_EXTRA_ARGS:-}
      # ---- Runtime ----
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_USAGE_SOURCE=production
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # ---- Model-specific env vars (0 = disabled) ----
      - VLLM_MARLIN_USE_ATOMIC_ADD=${VLLM_MARLIN_USE_ATOMIC_ADD:-0}
      - VLLM_USE_FLASHINFER_MOE_FP4=${VLLM_USE_FLASHINFER_MOE_FP4:-0}
      # ---- DeepSeek-V4 Flash specific (empty = unset, no effect on other models) ----
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-}
      - VLLM_TRITON_MLA_SPARSE=${VLLM_TRITON_MLA_SPARSE:-}
      - FLASHINFER_DISABLE_VERSION_CHECK=${FLASHINFER_DISABLE_VERSION_CHECK:-}
      - TILELANG_CLEANUP_TEMP_FILES=${TILELANG_CLEANUP_TEMP_FILES:-}
      - DG_JIT_USE_NVRTC=${DG_JIT_USE_NVRTC:-}
      - DG_JIT_NVCC_COMPILER=${DG_JIT_NVCC_COMPILER:-}
      - DG_JIT_PRINT_COMPILER_COMMAND=${DG_JIT_PRINT_COMPILER_COMMAND:-}
      - TORCH_CUDA_ARCH_LIST=${TORCH_CUDA_ARCH_LIST:-}
      # ---- Patches (0 = disabled) ----
      - APPLY_TEXT_ONLY_SHIM=${APPLY_TEXT_ONLY_SHIM:-0}
      # GB10 UMA: bypass request_memory() startup pre-check (patch_skip_init_memory_check.py).
      # 1 = skip (any real OOM still surfaces at weight load). See docs/dsv4-flash-tp2.md §11.6.
      - VLLM_SKIP_INIT_MEMORY_CHECK=${VLLM_SKIP_INIT_MEMORY_CHECK:-0}
      # ---- Multi-node networking (200Gbps RoCE) ----
      # All RDMA vars use empty defaults so single-Spark users do not need
      # to set them. entrypoint.sh normalizes for CLUSTER_MODE=single by
      # forcing VLLM_HOST_IP=127.0.0.1 and clearing NCCL/GLOO/UCX ifname,
      # which is what avoids the "tcp://10.10.10.1 server socket has timed
      # out" c10d hang.
      - VLLM_HOST_IP=${HEAD_ROCE_IP:-}
      - RAY_NODE_IP_ADDRESS=${HEAD_ROCE_IP:-}
      - RAY_OVERRIDE_NODE_IP_ADDRESS=${HEAD_ROCE_IP:-}
      - HEAD_ROCE_IP=${HEAD_ROCE_IP:-}
      - WORKER_ROCE_IP=${WORKER_ROCE_IP:-}
      - ROCE_IF_NAME=${ROCE_IF_NAME:-}
      - IB_HCA_NAME=${IB_HCA_NAME:-}
      - RAY_PORT=${RAY_PORT:-}
      - NCCL_SOCKET_IFNAME=${ROCE_IF_NAME:-}
      - GLOO_SOCKET_IFNAME=${ROCE_IF_NAME:-}
      - UCX_NET_DEVICES=${ROCE_IF_NAME:-}
      - NCCL_IB_HCA=${IB_HCA_NAME:-}
      - NCCL_IB_DISABLE=${NCCL_IB_DISABLE:-0}
      - NCCL_DEBUG=${NCCL_DEBUG:-WARN}
      - NCCL_NVLS_ENABLE=${NCCL_NVLS_ENABLE:-1}
      - VLLM_USE_BREAKABLE_CUDAGRAPH=${VLLM_USE_BREAKABLE_CUDAGRAPH:-}
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=${VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS:-}
      # ---- unholy-fusion / B12X kernels (empty = unset, no effect on jasl image) ----
      - VLLM_USE_B12X_MOE=${VLLM_USE_B12X_MOE:-}
      - VLLM_USE_B12X_MHC=${VLLM_USE_B12X_MHC:-}
      - VLLM_USE_B12X_FP8_GEMM=${VLLM_USE_B12X_FP8_GEMM:-}
      - VLLM_USE_B12X_SPARSE_INDEXER=${VLLM_USE_B12X_SPARSE_INDEXER:-}
      - VLLM_USE_B12X_WO_PROJECTION=${VLLM_USE_B12X_WO_PROJECTION:-}
      - RAY_DEDUP_LOGS=0
      - RAY_memory_monitor_refresh_ms=0
      # ---- unholy-fusion: NCCL / RoCE tuning ----
      - NCCL_NET=${NCCL_NET:-}
      - NCCL_CUMEM_ENABLE=${NCCL_CUMEM_ENABLE:-}
      - NCCL_CROSS_NIC=${NCCL_CROSS_NIC:-}
      - NCCL_IGNORE_CPU_AFFINITY=${NCCL_IGNORE_CPU_AFFINITY:-}
      # ---- unholy-fusion: NCCL SO + JIT cache root + sparse indexer ----
      - VLLM_NCCL_SO_PATH=${VLLM_NCCL_SO_PATH:-}
      - VLLM_CACHE_ROOT=${VLLM_CACHE_ROOT:-}
      - FLASHINFER_CUDA_ARCH_LIST=${FLASHINFER_CUDA_ARCH_LIST:-}
      - VLLM_SPARSE_INDEXER_MAX_LOGITS_MB=${VLLM_SPARSE_INDEXER_MAX_LOGITS_MB:-256}
      - MTP_NUM_TOKENS=${MTP_NUM_TOKENS:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "64gb"
    volumes:
      - ${MODEL_PATH}:${MODEL_CONTAINER_PATH}:ro
      - ./.cache/vllm:/root/.cache/vllm
      - ./cache/unholy-jit:/cache/jit
      - ./cache/unholy-hf:/cache/huggingface
      - /sys/class/infiniband:/sys/class/infiniband:ro
      - ${ENTRYPOINT_FILE:-./entrypoints/entrypoint.sh}:/entrypoint.sh:ro
      - ./patches:/patches:ro
    devices:
      - /dev/infiniband:/dev/infiniband
    entrypoint: ["bash", "/entrypoint.sh"]
    ulimits:
      memlock:
        soft: -1
        hard: -1
    # eugr/spark-vllm-docker#257 권고 반영 + 자체 재검증 (2026-05-23 G6):
    # docker compose v2 일반 deploy 에서 `on-failure:N` 의 max-retries 부분이
    # 무시되어 결과적으로 무한 재시작 → host RAM thrashing → sshd-storm 재발.
    # zero retries 로 강화: EngineCore init failure 는 운영자에게 surface,
    # 외부 supervisor 위임. 재시작이 필요하면 `docker compose up -d` 수동 호출.
    restart: "no"

  worker:
    image: ${VLLM_IMAGE}
    container_name: vllm-spark-worker
    profiles: ["worker"]
    network_mode: host
    ipc: host
    environment:
      # ---- Role + cluster mode ----
      - ROLE=worker
      - CLUSTER_MODE=${CLUSTER_MODE:-dual-rdma}
      - TP_SIZE=${TP_SIZE:-2}
      # DISTRIBUTED_BACKEND: ray (Ray actor mode) or mp (SPMD with --nnodes)
      - DISTRIBUTED_BACKEND=${DISTRIBUTED_BACKEND:-ray}
      - MASTER_PORT=${MASTER_PORT:-29501}
      - NODE_RANK=${WORKER_NODE_RANK:-1}
      # ---- Model + serve params (needed for mp mode where worker also runs `vllm serve`) ----
      - MODEL_CONTAINER_PATH=${MODEL_CONTAINER_PATH}
      - SERVED_MODEL_NAME=${SERVED_MODEL_NAME}
      - HOST_PORT=${HOST_PORT:-8000}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN}
      - MAX_NUM_SEQS=${MAX_NUM_SEQS}
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION}
      - MAX_NUM_BATCHED_TOKENS=${MAX_NUM_BATCHED_TOKENS}
      - VLLM_EXTRA_ARGS=${VLLM_EXTRA_ARGS:-}
      # ---- Multi-node networking (200Gbps RoCE) ----
      # Worker is only meaningful with CLUSTER_MODE=dual-rdma; entrypoint.sh
      # validates the RDMA vars are present.
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_HOST_IP=${WORKER_ROCE_IP:-}
      - RAY_NODE_IP_ADDRESS=${WORKER_ROCE_IP:-}
      - RAY_OVERRIDE_NODE_IP_ADDRESS=${WORKER_ROCE_IP:-}
      - HEAD_ROCE_IP=${HEAD_ROCE_IP:-}
      - WORKER_ROCE_IP=${WORKER_ROCE_IP:-}
      - ROCE_IF_NAME=${ROCE_IF_NAME:-}
      - IB_HCA_NAME=${IB_HCA_NAME:-}
      - RAY_PORT=${RAY_PORT:-}
      - NCCL_SOCKET_IFNAME=${ROCE_IF_NAME:-}
      - GLOO_SOCKET_IFNAME=${ROCE_IF_NAME:-}
      - UCX_NET_DEVICES=${ROCE_IF_NAME:-}
      - NCCL_IB_HCA=${IB_HCA_NAME:-}
      - NCCL_IB_DISABLE=${NCCL_IB_DISABLE:-0}
      - NCCL_DEBUG=${NCCL_DEBUG:-WARN}
      - NCCL_NVLS_ENABLE=${NCCL_NVLS_ENABLE:-1}
      - VLLM_USE_BREAKABLE_CUDAGRAPH=${VLLM_USE_BREAKABLE_CUDAGRAPH:-}
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=${VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS:-}
      - RAY_memory_monitor_refresh_ms=0
      # ---- unholy-fusion / B12X kernels (empty = unset, no effect on jasl image) ----
      - VLLM_USE_B12X_MOE=${VLLM_USE_B12X_MOE:-}
      - VLLM_USE_B12X_MHC=${VLLM_USE_B12X_MHC:-}
      - VLLM_USE_B12X_FP8_GEMM=${VLLM_USE_B12X_FP8_GEMM:-}
      - VLLM_USE_B12X_SPARSE_INDEXER=${VLLM_USE_B12X_SPARSE_INDEXER:-}
      - VLLM_USE_B12X_WO_PROJECTION=${VLLM_USE_B12X_WO_PROJECTION:-}
      # ---- Model-specific env vars (0 = disabled) ----
      - VLLM_MARLIN_USE_ATOMIC_ADD=${VLLM_MARLIN_USE_ATOMIC_ADD:-0}
      - VLLM_USE_FLASHINFER_MOE_FP4=${VLLM_USE_FLASHINFER_MOE_FP4:-0}
      # ---- DeepSeek-V4 Flash specific (empty = unset, no effect on other models) ----
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-}
      - VLLM_TRITON_MLA_SPARSE=${VLLM_TRITON_MLA_SPARSE:-}
      - FLASHINFER_DISABLE_VERSION_CHECK=${FLASHINFER_DISABLE_VERSION_CHECK:-}
      - TILELANG_CLEANUP_TEMP_FILES=${TILELANG_CLEANUP_TEMP_FILES:-}
      - DG_JIT_USE_NVRTC=${DG_JIT_USE_NVRTC:-}
      - DG_JIT_NVCC_COMPILER=${DG_JIT_NVCC_COMPILER:-}
      - DG_JIT_PRINT_COMPILER_COMMAND=${DG_JIT_PRINT_COMPILER_COMMAND:-}
      - TORCH_CUDA_ARCH_LIST=${TORCH_CUDA_ARCH_LIST:-}
      # ---- Patches (0 = disabled) ----
      - APPLY_TEXT_ONLY_SHIM=${APPLY_TEXT_ONLY_SHIM:-0}
      # GB10 UMA: bypass request_memory() startup pre-check (patch_skip_init_memory_check.py).
      # 1 = skip (any real OOM still surfaces at weight load). See docs/dsv4-flash-tp2.md §11.6.
      - VLLM_SKIP_INIT_MEMORY_CHECK=${VLLM_SKIP_INIT_MEMORY_CHECK:-0}
      # ---- unholy-fusion: NCCL / RoCE tuning ----
      - NCCL_NET=${NCCL_NET:-}
      - NCCL_CUMEM_ENABLE=${NCCL_CUMEM_ENABLE:-}
      - NCCL_CROSS_NIC=${NCCL_CROSS_NIC:-}
      - NCCL_IGNORE_CPU_AFFINITY=${NCCL_IGNORE_CPU_AFFINITY:-}
      # ---- unholy-fusion: NCCL SO + JIT cache root + sparse indexer ----
      - VLLM_NCCL_SO_PATH=${VLLM_NCCL_SO_PATH:-}
      - VLLM_CACHE_ROOT=${VLLM_CACHE_ROOT:-}
      - FLASHINFER_CUDA_ARCH_LIST=${FLASHINFER_CUDA_ARCH_LIST:-}
      - VLLM_SPARSE_INDEXER_MAX_LOGITS_MB=${VLLM_SPARSE_INDEXER_MAX_LOGITS_MB:-256}
      - MTP_NUM_TOKENS=${MTP_NUM_TOKENS:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "64gb"
    volumes:
      - ${MODEL_PATH}:${MODEL_CONTAINER_PATH}:ro
      - ./.cache/vllm:/root/.cache/vllm
      - ./cache/unholy-jit:/cache/jit
      - ./cache/unholy-hf:/cache/huggingface
      - /sys/class/infiniband:/sys/class/infiniband:ro
      - ${ENTRYPOINT_FILE:-./entrypoints/entrypoint.sh}:/entrypoint.sh:ro
      - ./patches:/patches:ro
    devices:
      - /dev/infiniband:/dev/infiniband
    entrypoint: ["bash", "/entrypoint.sh"]
    ulimits:
      memlock:
        soft: -1
        hard: -1
    # eugr/spark-vllm-docker#257 권고 반영 + 자체 재검증 (2026-05-23 G6):
    # docker compose v2 일반 deploy 에서 `on-failure:N` 의 max-retries 부분이
    # 무시되어 결과적으로 무한 재시작 → host RAM thrashing → sshd-storm 재발.
    # zero retries 로 강화: EngineCore init failure 는 운영자에게 surface,
    # 외부 supervisor 위임. 재시작이 필요하면 `docker compose up -d` 수동 호출.
    restart: "no"
